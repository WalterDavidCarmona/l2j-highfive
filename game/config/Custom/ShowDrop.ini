# ---------------------------------------------------------------------------
# Show Drop - Visualizador de Drop para Jugadores
# ---------------------------------------------------------------------------
# Permite a los jugadores ver la tabla de drop de un monstruo haciendo
# Shift+Click sobre el mismo.
# Solo funciona sobre NPCs atacables (monstruos) que tengan drops definidos.
#
# Script : data/scripts/custom/ShowDrop/ShowDrop.java
# ---------------------------------------------------------------------------

# Habilitar el sistema Show Drop para jugadores.
# Default: True
ShowDropEnabled = True

# Mostrar tambien el boton de Spoil cuando el monstruo tiene drops de spoil.
# Default: True
ShowDropSpoilEnabled = True

# Cantidad de items mostrados por pagina en la lista de drops.
# Minimo: 1 | Maximo: 30 | Default: 10
ShowDropItemsPerPage = 10
