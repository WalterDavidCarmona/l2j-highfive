# ---------------------------------------------------------------------------
# Clan PvP Zone Event - Evento de clanes con RaidBoss final
# ---------------------------------------------------------------------------
# Flujo del evento:
#   1. Clanes se registran en el Gatekeeper Global (boton "Zona Clan PvP").
#   2. Al alcanzar MinClansToStart clanes registrados se inicia la cuenta regresiva.
#   3. Al terminar la cuenta, cada clan es teletransportado a un spawn diferente.
#   4. Los miembros de clan se matan entre si; cada kill da reputacion al clan atacante.
#   5. Cuando solo queda un clan vivo -> ese clan enfrenta al RaidBoss.
#   6. Al matar al RaidBoss -> recompensa a cada miembro presente -> teleport forzado.
#   7. El clan ganador no puede reinscribirse hasta que otro clan gane.
# ---------------------------------------------------------------------------

# Habilitar el sistema.
# Default: True
Enabled = True

# Minimo de clanes registrados para iniciar la cuenta regresiva.
# Default: 2
MinClansToStart = 2

# Duracion de la cuenta regresiva antes de iniciar el evento (en minutos).
# Default: 5
CountdownMinutes = 5

# Puntos de reputacion de clan ganados por cada kill de miembro rival.
# Se aplica directamente al puntaje del clan en el juego.
# Default: 100
ClanReputationPerKill = 100

# ---------------------------------------------------------------------------
# Puntos de spawn de clanes (hasta 8, se asignan en orden de registro)
# Formato: X,Y,Z
# Default: Area de Freya
# ---------------------------------------------------------------------------
ClanSpawn1 = 116344,-114805,-10984
ClanSpawn2 = 113104,-114815,-10984
ClanSpawn3 = 114714,-117072,-11080
ClanSpawn4 = 114707,-113195,-10984

# ---------------------------------------------------------------------------
# RaidBoss de instancia
# ---------------------------------------------------------------------------

# ID del NPC RaidBoss que se spawnea para el clan ganador.
# Default: 25286 (Queen Ant - reemplaza por el boss que prefieras)
RaidBossId = 25286

# Coordenadas de spawn del RaidBoss.
RaidBossX = 114714
RaidBossY = -117072
RaidBossZ = -11080
RaidBossHeading = 0

# ID de skill del Raid Curse para neutralizarlo en esta zona.
# Default: 4215
RaidCurseSkillId = 4215

# IDs de BossZone que cubren el area del evento (separados por coma).
# Si el area del RaidBoss esta dentro de una BossZone configurada en el servidor,
# agrega su ID aqui para que los jugadores puedan entrar sin ser expulsados.
# Deja vacio si no aplica.
# Ejemplo: BossZoneIds = 110011,110012
BossZoneIds =

# ---------------------------------------------------------------------------
# Recompensa por matar al RaidBoss
# ---------------------------------------------------------------------------

# ID del item de recompensa entregado a cada miembro del clan vencedor.
# Default: 57 (Adena)
RewardItemId = 57

# Cantidad de items entregados a cada miembro.
# Default: 1000000
RewardCount = 1000000

# ---------------------------------------------------------------------------
# Ubicacion de retorno
# Destino al que se teletransportan los eliminados y al finalizar el evento.
# Default: Giran Town
# ---------------------------------------------------------------------------
ReturnX = 82698
ReturnY = 148638
ReturnZ = -3473
