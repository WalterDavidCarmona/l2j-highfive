# ---------------------------------------------------------------------------
# Vote System Configuration
# ---------------------------------------------------------------------------

# Enable or disable the Vote System.
Enabled = True

# NPC ID for the Vote Master NPC (must exist in npcdata).
NpcId = 9090

# How often (in minutes) the server polls vote sites to check global totals.
CheckIntervalMinutes = 5

# Number of NEW votes needed (since last reward) to trigger a global reward.
# Example: 20 means every 20 votes all online players get rewarded.
GlobalVotesThreshold = 20

# Hours a player must wait between individual vote rewards (per site).
IndividualCooldownHours = 12

# ---------------------------------------------------------------------------
# Reward Settings
# ---------------------------------------------------------------------------

# Global reward: given to ALL online players when the vote threshold is reached.
EnableGlobalReward = True
GlobalRewardItemId = 57
GlobalRewardCount = 1000000

# Individual reward: given to the player who voted when they claim it.
EnableIndividualReward = True
IndividualRewardItemId = 6673
IndividualRewardCount = 1

# Enable .getreward voiced command so players can claim without visiting the NPC.
EnableVoteCommand = False

# ---------------------------------------------------------------------------
# Vote Site: Hopzone
# ---------------------------------------------------------------------------
# Global API: returns JSON with server vote count.
# Individual API: checks if a specific IP voted. %IP% is replaced with player's IP.
# %TOKEN% is replaced with HopzoneToken in both URLs.
HopzoneEnabled = False
HopzoneToken = YOUR_HOPZONE_TOKEN_HERE
HopzoneGlobalUrl = https://hopzone.eu/api/votes?token=%TOKEN%
HopzoneIndividualUrl = https://hopzone.eu/api/voted?token=%TOKEN%&ip=%IP%

# ---------------------------------------------------------------------------
# Vote Site: L2TopZone
# ---------------------------------------------------------------------------
L2TopZoneEnabled = False
L2TopZoneToken = YOUR_L2TOPZONE_TOKEN_HERE
L2TopZoneGlobalUrl = https://l2topzone.com/api.php?token=%TOKEN%
L2TopZoneIndividualUrl = https://l2topzone.com/api.php?token=%TOKEN%&ip=%IP%

# ---------------------------------------------------------------------------
# Vote Site: ItopZ
# ---------------------------------------------------------------------------
ItopZEnabled = False
ItopZToken = YOUR_ITOPZ_TOKEN_HERE
ItopZGlobalUrl = https://itopz.com/votes/%TOKEN%
ItopZIndividualUrl = https://itopz.com/check/%TOKEN%/%IP%

# ---------------------------------------------------------------------------
# Vote Site: TopZone (l2.topgameserver.net)
# ---------------------------------------------------------------------------
TopZoneEnabled = False
TopZoneToken = YOUR_TOPZONE_TOKEN_HERE
TopZoneGlobalUrl = https://l2.topgameserver.net/high-five/index.php?link=getTopServersVotes&token=%TOKEN%
TopZoneIndividualUrl = https://l2.topgameserver.net/high-five/index.php?link=getVotedIp&token=%TOKEN%&ip=%IP%
