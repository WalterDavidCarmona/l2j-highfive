# ---------------------------------------------------------------------------
# Global Gatekeeper NPC - Teleportador Global Custom
# ---------------------------------------------------------------------------
# Este NPC permite teletransportarse a Ciudades, Castles, Fortress,
# Zonas Farm configurables, y Zonas especiales de Clan PvP / Party PvP.
#
# Para spawnear el NPC en juego usa el comando admin:
#   //spawn 50009
# ---------------------------------------------------------------------------

# Habilitar el Global Gatekeeper.
# Default: True
GlobalGatekeeperEnabled = True

# ID del NPC del Global Gatekeeper.
# Ver: data/stats/npcs/custom/GlobalGatekeeper.xml (ID 50009 = Fiorella)
# Default: 50009
GlobalGatekeeperNpcId = 50009

# Precio por cada teleport. 0 = gratis.
# Default: 0
GlobalGatekeeperTeleportPrice = 0

# Item ID usado como moneda para el precio del teleport.
# Default: 57 (Adena)
GlobalGatekeeperCurrencyId = 57

# Bloquear teleport si el jugador esta en Modo Combate.
# Default: True
GlobalGatekeeperBlockCombat = True

# Bloquear teleport si el jugador esta registrado o activo en Olympiad.
# Default: True
GlobalGatekeeperBlockOlympiad = True

# Bloquear teleport si el jugador tiene Karma (personaje PK).
# Default: True
GlobalGatekeeperBlockPK = True

