# ---------------------------------------------------------------------------
# Custom PvP Zone Configuration
# ---------------------------------------------------------------------------

# Enable or disable the PvP Zone system.
# Default: True
Enabled = True

# How often (in minutes) the zone rotates to the next one.
# Default: 60
RotationMinutes = 60

# Reward item ID given per kill.
# 57 = Adena
# Default: 57
RewardItemId = 57

# Base reward count per kill (used if no streak matches).
# Default: 50000
RewardBaseCount = 50000

# Kill streak rewards: kills=rewardCount separated by semicolons.
# Format: kills1,reward1;kills2,reward2;kills3,reward3
# Default: 1,50000;2,60000;3,70000;4,80000;5,90000
Streaks = 1,50000;2,60000;3,70000;4,80000;5,90000

# How many consecutive kills to grant Hero status.
# Default: 5
HeroStreakRequired = 10

# Respawn delay in seconds after dying in the PvP zone.
# Default: 5
RespawnDelay = 5

# ---------------------------------------------------------------------------
# Top Killer Reward (per zone rotation)
# ---------------------------------------------------------------------------
# Item ID rewarded to the top killer when the zone rotates.
# The winner must have at least 1 kill in that zone.
# 0 = disabled (no reward given)
# Default: 0
TopKillerRewardItemId = 6673

# Amount of the reward item given to the top killer.
# Default: 1
TopKillerRewardCount = 1

# ---------------------------------------------------------------------------
# Custom Title
# ---------------------------------------------------------------------------
# Title displayed while inside the PvP zone.
# The original player title is restored when they leave the zone.
# Leave empty to keep the player's current title unchanged.
# Default: Lineage2IA
ZoneTitle = Lineage2IA

# ---------------------------------------------------------------------------
# Clan Restrictions
# ---------------------------------------------------------------------------
# If True, hides the clan crest and clan title while inside the PvP zone.
# Clan buffs and heal/CP skills will only affect the caster (self-only).
# Everything is restored to normal when the player leaves the zone.
# Default: True
HideClan = True

# ---------------------------------------------------------------------------
# Party Block
# ---------------------------------------------------------------------------
# If True, players inside the PvP zone cannot send or receive party invitations.
# Players already in a party will be denied entry by the NPC.
# Default: True
BlockParty = True

# ---------------------------------------------------------------------------
# Return Location
# ---------------------------------------------------------------------------
# Coordinates where players are sent when they use Restart while inside the
# PvP zone, AND where stuck characters are recovered on server startup
# (abrupt crash / kill -9).
# Use //loc in-game to get coordinates.
# Default: Giran Town (83400, 147943, -3400)
ReturnX = 83400
ReturnY = 147943
ReturnZ = -3400

# ---------------------------------------------------------------------------
# PvP Zones
# ---------------------------------------------------------------------------
# Comma-separated list of zone definitions. Each zone uses the format:
#   ZoneName;x1,y1,z1;x2,y2,z2;x3,y3,z3;...
# Multiple zones are separated by a pipe character |
#
# Use //loc in-game to get coordinates.
#
# Default: 3 zones (Giran Harbor, Aden Colosseum, Rune Township)
Zones = Emerald Square;143811,143110,-11896;144649,147105,-12064;147382,143722,-12216;149858,144551,-12232|Antharas;179677,117317,-7704;175989,117523,-7704;174358,114173, -7704;180199,112208,-7704|Beleth;16358,211274,-9352;16333,215250,-9352;14282,213145,-9352;18247,213134,-9352
