# ============================================================
#  L2H5 Nginx — Configuración Anti-DDoS
#  Ubicación: /etc/nginx/sites-available/l2h5.conf
# ============================================================

# Zonas de rate limiting
limit_req_zone  $binary_remote_addr zone=general:10m  rate=30r/m;
limit_req_zone  $binary_remote_addr zone=auth:10m     rate=5r/m;
limit_req_zone  $binary_remote_addr zone=api:10m      rate=60r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Geo-blocking (requiere módulo GeoIP2 - opcional)
# geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb { $geoip2_country_code country iso_code; }

server {
    listen 80;
    listen [::]:80;
    server_name tu-dominio.com www.tu-dominio.com;

    # Redirigir a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tu-dominio.com www.tu-dominio.com;

    # SSL (reemplaza con tus certificados)
    ssl_certificate     /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Timeouts anti-DDoS ─────────────────────────────────
    client_body_timeout   12s;
    client_header_timeout 12s;
    keepalive_timeout     15s;
    send_timeout          10s;
    client_max_body_size  2m;

    # ── Headers de seguridad ────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header X-XSS-Protection       "1; mode=block"        always;
    add_header Referrer-Policy        "strict-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Bloquear User-Agents maliciosos ─────────────────────
    if ($http_user_agent ~* (curl|python|masscan|nikto|sqlmap|nmap|zgrab|scrapy|libwww)) {
        return 403;
    }
    if ($http_user_agent = "") {
        return 403;
    }

    # ── Bloquear métodos HTTP no necesarios ─────────────────
    if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS)$) {
        return 405;
    }

    # ── Rate limit — Endpoints de autenticación ─────────────
    location ~* ^/api/auth/(login|register|change-password) {
        limit_req        zone=auth burst=3 nodelay;
        limit_req_status 429;
        limit_conn       conn_limit 5;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Rate limit — API general ─────────────────────────────
    location /api/ {
        limit_req        zone=api burst=20 nodelay;
        limit_req_status 429;
        limit_conn       conn_limit 20;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # ── Rate limit — Recursos estáticos ─────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        limit_req  zone=general burst=60 nodelay;
        proxy_pass http://127.0.0.1:3000;
        expires    7d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Frontend / Node.js proxy ─────────────────────────────
    location / {
        limit_req   zone=general burst=10 nodelay;
        limit_conn  conn_limit 15;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Bloquear acceso a archivos sensibles ────────────────
    location ~* \.(env|log|sql|json|config)$ { return 404; }
    location ~ /\. { deny all; }
}
